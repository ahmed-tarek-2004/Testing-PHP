; KickZone — PHP configuration for Vercel serverless runtime
; This file is read by vercel-php during the build phase.

; Memory — 256 MB is enough for a Laravel API on serverless
memory_limit = 256M

; Max execution time per request (Vercel hobby plan allows up to 10s, pro up to 60s)
max_execution_time = 30

; Upload limits (keep small — use S3/Cloudinary for media in production)
upload_max_filesize = 10M
post_max_size = 10M

; Error display — always off in production
display_errors = Off
display_startup_errors = Off
log_errors = On

; Timezone
date.timezone = "UTC"

; OPcache — speeds up repeated PHP parsing on warm starts
opcache.enable = 1
opcache.validate_timestamps = 0
opcache.max_accelerated_files = 20000
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16

; Session — not used (we use cookie/Sanctum token auth) but set safe defaults
session.use_strict_mode = 1
session.cookie_httponly = 1
session.cookie_samesite = "Lax"